name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required secrets
        env:
          ADDRESSR_RAPIDAPI_KEY: ${{ secrets.ADDRESSR_RAPIDAPI_KEY }}
        run: |
          if [ -z "$ADDRESSR_RAPIDAPI_KEY" ]; then
            echo "::error::Repo secret ADDRESSR_RAPIDAPI_KEY is not set. Run: printf %s \"\$ADDRESSR_RAPIDAPI_KEY\" | gh secret set ADDRESSR_RAPIDAPI_KEY"
            exit 1
          fi
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:integration
        env:
          ADDRESSR_RAPIDAPI_KEY: ${{ secrets.ADDRESSR_RAPIDAPI_KEY }}
      - name: Install Playwright browsers
        run: pnpm --filter @mountainpass/addressr-core exec playwright install --with-deps chromium
      - run: pnpm test:integration:browser
        env:
          ADDRESSR_RAPIDAPI_KEY: ${{ secrets.ADDRESSR_RAPIDAPI_KEY }}
      - run: pnpm build

  release:
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify required secrets
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::Repo secret NPM_TOKEN is not set"
            exit 1
          fi
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
